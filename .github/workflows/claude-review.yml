name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    permissions:
      contents: read
      pull-requests: write
    uses: LinaKrasko/shared-workflows/.github/workflows/claude-review.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
